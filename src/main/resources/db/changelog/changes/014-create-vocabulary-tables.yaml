databaseChangeLog:
  - changeSet:
      id: 014-create-vocabulary-words
      author: system
      changes:
        - createTable:
            tableName: vocabulary_words
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: word
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: ipa
                  type: VARCHAR(100)
                  constraints:
                    nullable: true
              - column:
                  name: word_type
                  type: VARCHAR(30)
                  constraints:
                    nullable: true
              - column:
                  name: meaning_vi
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: meaning_en
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: example_sentence
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: example_vi
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: topic
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: level
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: source_ai
                  type: VARCHAR(30)
                  defaultValue: gemini
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - createTable:
            tableName: user_vocabulary_progress
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: vocabulary_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: learned_flag
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: learned_at
                  type: TIMESTAMP
                  constraints:
                    nullable: true
              - column:
                  name: favorite_flag
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: need_review_flag
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: review_count
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: correct_count
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: wrong_count
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: last_review_at
                  type: TIMESTAMP
                  constraints:
                    nullable: true

        # --- Unique constraints ---
        - addUniqueConstraint:
            tableName: vocabulary_words
            columnNames: word, topic, level
            constraintName: uk_vocab_word_topic_level

        - addUniqueConstraint:
            tableName: user_vocabulary_progress
            columnNames: user_id, vocabulary_id
            constraintName: uk_user_vocab

        # --- Foreign keys ---
        - addForeignKeyConstraint:
            baseTableName: user_vocabulary_progress
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_vocab_progress_user
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: user_vocabulary_progress
            baseColumnNames: vocabulary_id
            referencedTableName: vocabulary_words
            referencedColumnNames: id
            constraintName: fk_vocab_progress_word
            onDelete: CASCADE

        # --- Indexes ---
        - createIndex:
            tableName: vocabulary_words
            indexName: idx_vocab_topic_level
            columns:
              - column:
                  name: topic
              - column:
                  name: level

        - createIndex:
            tableName: vocabulary_words
            indexName: idx_vocab_word
            columns:
              - column:
                  name: word

        - createIndex:
            tableName: user_vocabulary_progress
            indexName: idx_progress_user_id
            columns:
              - column:
                  name: user_id

        - createIndex:
            tableName: user_vocabulary_pr ogress
            indexName: idx_progress_vocabulary_id
            columns:
              - column:
                  name: vocabulary_id
