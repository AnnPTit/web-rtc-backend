databaseChangeLog:
  - changeSet:
      id: 009-create-questions
      author: an
      changes:
        - createTable:
            tableName: questions
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: assignment_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: question
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: correct_answer
                  type: VARCHAR(1)
                  constraints:
                    nullable: false

  - changeSet:
      id: 010-create-options
      author: an
      changes:
        - createTable:
            tableName: options
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: option_key
                  type: VARCHAR(1)
                  constraints:
                    nullable: false
              - column:
                  name: option_value
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: question_id
                  type: BIGINT
                  constraints:
                    nullable: false

  # 👉 thêm foreign key riêng (best practice)
  - changeSet:
      id: 3-add-fk-option-question
      author: an
      changes:
        - addForeignKeyConstraint:
            baseTableName: options
            baseColumnNames: question_id
            referencedTableName: questions
            referencedColumnNames: id
            constraintName: fk_option_question
            onDelete: CASCADE

  # 👉 index để query nhanh hơn
  - changeSet:
      id: 4-add-index
      author: an
      changes:
        - createIndex:
            tableName: options
            indexName: idx_option_question_id
            columns:
              - column:
                  name: question_id

        - createIndex:
            tableName: questions
            indexName: idx_questions_correct_answer
            columns:
              - column:
                  name: correct_answer